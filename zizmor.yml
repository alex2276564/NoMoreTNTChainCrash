rules:
  # unpinned-uses is intentionally disabled.
  #
  # This project uses a two-tier version pinning strategy as a supply chain
  # attack defense, documented in each workflow file:
  #
  # - Jobs WITHOUT secrets/uploads: @main/@master is acceptable.
  # - Jobs WITH secrets/uploads: pinned to a semver tag (e.g. @v4).
  #
  # SHA pinning is intentionally NOT used because Renovate's minimumReleaseAge
  # does not apply to digest/pinDigest update types, meaning SHA pins would
  # remove the 14-day stabilization delay and give a false sense of security.
  #
  # We consciously accept the residual risk that a compromised tag/release
  # could pass the minimumReleaseAge window and be adopted, in exchange for
  # better automation and maintainability for this repository. Additional
  # scanners (CodeQL, Trivy, Snyk, OSV, Socket, StepSecurity) are used to
  # reduce that remaining supply-chain risk.
  #
  # See: https://docs.renovatebot.com/key-concepts/minimum-release-age/#which-update-types-take-minimumreleaseage-into-account
  unpinned-uses:
    disable: true