name: Scheduled Security Scan

# =============================================================================
# Security model for GitHub Actions versions:
#
# Jobs WITHOUT secrets/upload/publish (build outputs, SARIF, etc.) →
#   @main is acceptable (no sensitive exposure).
#
# Jobs WITH secrets/upload/publish → pinned to a semver tag (e.g. @v4),
#   which allows Renovate's minimumReleaseAge=14d to act as a supply-chain
#   cooldown before we adopt new action releases.
#
# SHA pinning is intentionally NOT used:
# - Renovate's minimumReleaseAge does not apply to digest/pinDigest updates,
#   so hard SHA pins would remove the stabilization delay and give a false
#   sense of security.
# - We consciously accept the residual risk that a compromised tag/release
#   could be adopted after the 14-day window in exchange for better
#   automation and maintainability of this repo.
#
# See Renovate docs:
# https://docs.renovatebot.com/key-concepts/minimum-release-age/#which-update-types-take-minimumreleaseage-into-account
# =============================================================================

on:
  schedule:
    - cron: '0 4 * * *' # every day at 4:00 UTC
  workflow_dispatch:    # can be run manually from the GitHub UI

jobs:
  security-scan:
    name: 🔐 Security Scan CodeQL
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-scan-snyk:
    name: 🔐 Security Scan Snyk
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/gradle-9-jdk17@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: /opt/java/openjdk # Enforce directory expected by the Snyk container
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload Snyk scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'snyk.sarif'

  security-scan-trivy:
    name: 🔐 Security Scan Trivy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'

      - name: Run Trivy (console report)
        if: failure()
        run: |
          echo "==== Trivy console report ===="
          trivy fs .

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  security-scan-osv:
    name: 🔐 Security Scan OSV

    permissions:
      contents: read
      actions: read
      security-events: write

    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      fail-on-vuln: true
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./

  security-scan-zizmor:
    name: 🔐 GitHub Actions Security (zizmor)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@v0.5.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          advanced-security: false
