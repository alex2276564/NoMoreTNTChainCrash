name: Release Minecraft Plugin

# =============================================================================
# Security model for GitHub Actions: action versioning & runner egress
#
# RATIONALE
# ---------
# This is an open-source project. Our primary goals are:
# - protect against supply-chain attacks via compromised GitHub Actions;
# - prevent exfiltration or misuse of write-capable credentials
#   (GITHUB_TOKEN with write permissions, environment/cloud secrets, etc.);
# - keep maintenance overhead low by relying on Renovate where possible.
#
# ACTION VERSIONING
# -----------------
# Low-risk jobs:
# - GITHUB_TOKEN has only read-level permissions (e.g. contents: read)
# - No user-defined secrets (`secrets.*`) or environment-specific secrets
# - No external publish/upload (packages, deployments, code scanning, etc.)
#
# → For such jobs, using @main for third-party actions is acceptable: it does
#   not introduce additional sensitive exposure beyond the public source code.
#
# High-risk jobs:
# - Any write-level permissions on GITHUB_TOKEN (contents, checks,
#   pull-requests, deployments, packages, security-events, id-token, ...)
#   OR any use of secrets/credentials
#   OR any external publish/upload
#
# → Third-party actions MUST be pinned to a semver tag (e.g. @v1 or @v1.0.0),
#   so Renovate's minimumReleaseAge=14d provides a supply-chain cooldown
#   before we adopt new action releases.
#
# SHA pinning is intentionally NOT used:
# - This is an open-source project; source code confidentiality is not a
#   primary concern.
# - Renovate's minimumReleaseAge does not apply to digest/pinDigest updates,
#   so hard SHA pins would remove the stabilization delay and give a false
#   sense of security.
# - We consciously accept the residual risk that a compromised tag/release
#   could be adopted after the 14-day window in exchange for better
#   automation and maintainability of this repo.
#
# EGRESS POLICY (step-security/harden-runner)
# ------------------------------------------
# High-risk jobs (see above):
# - Use egress-policy: block with an explicit allowed-endpoints allowlist.
#   Rationale: jobs that can write to GitHub or external systems, or that
#   have access to secrets, must not be able to exfiltrate data or call
#   arbitrary endpoints.
#
# Low-risk jobs (read-only scanning / linting):
# - Use egress-policy: audit.
#   Rationale: security/scanning tools (Semgrep, Trivy, etc.) may legitimately
#   contact varying endpoints across versions. Strict blocking would require
#   frequent allowlist maintenance with little security benefit, since these
#   jobs have no write-level permissions and no secrets to exfiltrate.
#
# See Renovate docs:
#   https://docs.renovatebot.com/key-concepts/minimum-release-age/#which-update-types-take-minimumreleaseage-into-account
# See Harden-Runner docs:
#   https://docs.stepsecurity.io/harden-runner
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 1.0.3)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (markdown supported)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # ================================================================
  # 🏗️ BUILD: build JAR and compute SHA-256
  # ================================================================
  build:
    name: 🏗️ Build plugin
    runs-on: ubuntu-latest

    outputs:
      jar_file: ${{ steps.jar.outputs.jar_file }}
      jar_name: ${{ steps.jar.outputs.jar_name }}
      sha256: ${{ steps.jar.outputs.sha256 }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      #      - name: Check Gradle version matches input
      #        env:
      #          RELEASE_VERSION: ${{ inputs.release_version }}
      #        run: |
      #          GRADLE_VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
      #          echo "Gradle project version: $GRADLE_VERSION"
      #          if [ "$GRADLE_VERSION" != "$RELEASE_VERSION" ]; then
      #            echo "::error::Version mismatch: Gradle=$GRADLE_VERSION, input=$RELEASE_VERSION"
      #            exit 1
      #          fi

      - name: Build plugin (reproducible)
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          export SOURCE_DATE_EPOCH
          chmod +x gradlew
          ./gradlew clean build --no-daemon

      - name: Locate JAR and compute SHA-256
        id: jar
        run: |
          # Use printf instead of ls to avoid SC2010, still filter out -plain.jar
          JAR_FILE=$(printf '%s\n' build/libs/*.jar 2>/dev/null \
            | grep -v '\-plain\.jar' \
            | head -1)

          # If glob didn't match, JAR_FILE will literally be "build/libs/*.jar"
          if [ -z "$JAR_FILE" ] || [ "$JAR_FILE" = 'build/libs/*.jar' ]; then
            echo "::error::No JAR found in build/libs/"
            exit 1
          fi

          JAR_NAME=$(basename "$JAR_FILE")
          SHA=$(sha256sum "$JAR_FILE" | cut -d' ' -f1)

          {
            echo "jar_file=$JAR_FILE"
            echo "jar_name=$JAR_NAME"
            echo "sha256=$SHA"
          } >> "$GITHUB_OUTPUT"

          echo "Built JAR: $JAR_FILE"
          echo "SHA-256 : $SHA"

      - name: Upload JAR as workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plugin-jar
          path: ${{ steps.jar.outputs.jar_file }}
          retention-days: 3
          if-no-files-found: error

  # ================================================================
  # 🔏 SLSA PROVENANCE (Gradle SLSA3 builder)
  # ================================================================
  provenance:
    name: 🔏 SLSA Provenance (SLSA3)
    needs: build

    permissions:
      actions: read
      id-token: write   # required for Sigstore/OIDC signing
      contents: write   # required to upload provenance as artifact

    # SLSA Gradle builder: MUST be pinned to exact semver tag (vX.Y.Z)
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_gradle_slsa3.yml@v2.1.0
    with:
      # Path(s) to artifacts to attest, relative to repo root.
      # This path must match what `./gradlew build` produces.
      artifact-list: ./build/libs/${{ needs.build.outputs.jar_name }}
      # Repo is public, so we explicitly allow logging to public Rekor
      rekor-log-public: true

  # ================================================================
  # 🚀 GITHUB RELEASE
  # ================================================================
  release:
    name: 🚀 GitHub Release
    needs: [ build, provenance ]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Download plugin JAR
        uses: actions/download-artifact@v8.0.1
        with:
          name: plugin-jar
          path: dist

      - name: Download SLSA provenance
        uses: actions/download-artifact@v8.0.1
        with:
          # NOTE: Run this workflow once, then look at the "Artifacts"
          # section of the run to see the exact name of the artifact that
          # the SLSA Gradle builder produced. Replace "slsa-provenance"
          # below with that name if it differs.
          name: slsa-provenance
          path: dist

      - name: List dist content (debug)
        run: ls -R dist

      - name: Create GitHub Release
        # zizmor: softprops/action-gh-release is intentionally used over
        # `gh release` CLI — it provides atomic asset upload, glob support,
        # and release update semantics not easily replicated with the CLI.
        uses: softprops/action-gh-release@v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          # No automatic "v" prefix: the tag will be exactly what you type
          # in the "release_version" input (e.g. "1.0.3").
          tag_name: ${{ inputs.release_version }}
          name: NoMoreTNTChainCrash ${{ inputs.release_version }}
          body: |
            ${{ inputs.release_notes }}

            ---

            <details>
            <summary><strong>Click to view how to verify this build (checksums & SLSA)</strong></summary>

            ### 1. Verify SHA-256 checksum

            After downloading the JAR from this release, run:

            **Linux / macOS:**
            ```bash
            sha256sum ${{ needs.build.outputs.jar_name }}
            ```

            **Windows (PowerShell):**
            ```powershell
            Get-FileHash ${{ needs.build.outputs.jar_name }} -Algorithm SHA256
            ```


            Expected output:

            ```text
            ${{ needs.build.outputs.sha256 }}  ${{ needs.build.outputs.jar_name }}
            ```

            If the checksum does not match, **do not use this JAR** and please
            open an issue: https://github.com/${{ github.repository }}/issues

            ---

            ### 2. Verify SLSA provenance (supply-chain integrity)

            This project publishes SLSA Build Level 3 provenance for the JAR.
            Advanced users can verify that the JAR was built by this repository's
            GitHub Actions workflow without tampering.

            #### 2.1. Install \`slsa-verifier\`

            Option A — via Go:

            ```bash
            go install github.com/slsa-framework/slsa-verifier/v2/cmd/slsa-verifier@latest
            ```

            Option B — prebuilt binaries:

            1. Go to: https://github.com/slsa-framework/slsa-verifier/releases/latest
            2. Download the binary for your OS
            3. Put it into your \$PATH and make it executable

            #### 2.2. Download artifacts from this release

            From this GitHub Release page, download:

            - \`${{ needs.build.outputs.jar_name }}\`
            - \`${{ needs.build.outputs.jar_name }}.intoto.jsonl\`

            (The \`.intoto.jsonl\` file is the signed SLSA provenance attestation.)

            #### 2.3. Run verification

            ```bash
            slsa-verifier verify-artifact \
              ${{ needs.build.outputs.jar_name }} \
              --provenance-path ${{ needs.build.outputs.jar_name }}.intoto.jsonl \
              --source-uri github.com/${{ github.repository }} \
              --source-tag ${{ inputs.release_version }}
            ```

            If verification fails, or if the provenance refers to a different
            repository, tag, or commit than expected, **do not trust this build**
            and please open an issue immediately:
            https://github.com/${{ github.repository }}/issues

            </details>
          files: |
            dist/*.jar
            dist/*.intoto.jsonl
          fail_on_unmatched_files: true