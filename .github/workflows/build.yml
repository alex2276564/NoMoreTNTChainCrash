name: Build Minecraft Plugin

# =============================================================================
# Security model for GitHub Actions: action versioning & runner egress
#
# RATIONALE
# ---------
# This is an open-source project. Our primary goals are:
# - protect against supply-chain attacks via compromised GitHub Actions;
# - prevent exfiltration or misuse of write-capable credentials
#   (GITHUB_TOKEN with write permissions, environment/cloud secrets, etc.);
# - keep maintenance overhead low by relying on Renovate where possible.
#
# ACTION VERSIONING
# -----------------
# Low-risk jobs:
# - GITHUB_TOKEN has only read-level permissions (e.g. contents: read)
# - No user-defined secrets (`secrets.*`) or environment-specific secrets
# - No external publish/upload (packages, deployments, code scanning, etc.)
#
# → For such jobs, using @main for third-party actions is acceptable: it does
#   not introduce additional sensitive exposure beyond the public source code.
#
# High-risk jobs:
# - Any write-level permissions on GITHUB_TOKEN (contents, checks,
#   pull-requests, deployments, packages, security-events, id-token, ...)
#   OR any use of secrets/credentials
#   OR any external publish/upload
#
# → Third-party actions MUST be pinned to a semver tag (e.g. @v1 or @v1.0.0),
#   so Renovate's minimumReleaseAge=14d provides a supply-chain cooldown
#   before we adopt new action releases.
#
# SHA pinning is intentionally NOT used:
# - This is an open-source project; source code confidentiality is not a
#   primary concern.
# - Renovate's minimumReleaseAge does not apply to digest/pinDigest updates,
#   so hard SHA pins would remove the stabilization delay and give a false
#   sense of security.
# - We consciously accept the residual risk that a compromised tag/release
#   could be adopted after the 14-day window in exchange for better
#   automation and maintainability of this repo.
#
# EGRESS POLICY (step-security/harden-runner)
# ------------------------------------------
# High-risk jobs (see above):
# - Use egress-policy: block with an explicit allowed-endpoints allowlist.
#   Rationale: jobs that can write to GitHub or external systems, or that
#   have access to secrets, must not be able to exfiltrate data or call
#   arbitrary endpoints.
#
# Low-risk jobs (read-only scanning / linting):
# - Use egress-policy: audit.
#   Rationale: security/scanning tools (Semgrep, Trivy, etc.) may legitimately
#   contact varying endpoints across versions. Strict blocking would require
#   frequent allowlist maintenance with little security benefit, since these
#   jobs have no write-level permissions and no secrets to exfiltrate.
#
# See Renovate docs:
#   https://docs.renovatebot.com/key-concepts/minimum-release-age/#which-update-types-take-minimumreleaseage-into-account
# See Harden-Runner docs:
#   https://docs.stepsecurity.io/harden-runner
# =============================================================================

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  lint-actions:
    name: 🧹 Lint Actions
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Actionlint (Reviewdog)
        uses: step-security/action-actionlint@v1.72.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          level: error

  lint-renovate:
    name: 🧹 Lint Renovate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Bun
        uses: step-security/setup-bun@main
        with:
          bun-version: latest

      - name: Setup Socket Firewall
        uses: socketdev/action@main
        with:
          mode: firewall-free

      - name: Validate Renovate Config via Socket Firewall
        run: |
          sfw bun --yes --package renovate renovate-config-validator --strict

  lint-links:
    name: 🧹 Lint Links
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Lint Links
        uses: umbrelladocs/action-linkspector@v1.5.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          fail_level: error

  lint-markdown:
    name: 🧹 Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@main
        with:
          globs: '**/*.md'
          config: '.markdownlint.jsonc'

  security-scan:
    name: 🔐 Security Scan CodeQL
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build for CodeQL
        run: ./gradlew build -x test

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-scan-semgrep:
    name: 🔐 Security Scan Semgrep
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.socket.dev:443
            files.pythonhosted.org:443
            firewall-api.socket.dev:443
            github.com:443
            metrics.semgrep.dev:443
            pypi.org:443
            release-assets.githubusercontent.com:443
            semgrep.dev:443

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Setup Socket Firewall
        uses: socketdev/action@v1.3.2
        with:
          mode: firewall-free

      - name: Install Semgrep via Socket Firewall
        run: sfw pip install semgrep

      - name: Setup Semgrep Pro Engine via Socket Firewall
        run: sfw semgrep install-semgrep-pro

      - name: Run Semgrep
        run: |
          semgrep scan \
            --pro \
            --config auto \
            --config "p/java" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --config "p/github-actions" \
            --config "p/supply-chain" \
            --exclude "**/build/**" \
            --exclude "**/.gradle/**" \
            --exclude "**/test/**" \
            --sarif --output semgrep.sarif \
            --error

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  security-scan-snyk:
    name: 🔐 Security Scan Snyk (push)
    runs-on: ubuntu-latest

    # Skip security scan Snyk for PR (for PR we connect GitHub App integration Snyk)
    if: github.event_name == 'push'

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.snyk.io:443
            github.com:443
            oss.sonatype.org:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            repo.papermc.io:443
            repo.tcoded.com:443
            repo1.maven.org:443
            services.gradle.org:443

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/gradle-9-jdk17@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: /opt/java/openjdk # Enforce directory expected by the Snyk container
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload Snyk scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'snyk.sarif'

  security-scan-trivy:
    name: 🔐 Security Scan Trivy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'

      - name: Run Trivy (console report)
        if: failure()
        run: |
          echo "==== Trivy console report ===="
          trivy fs .

      - name: Upload Trivy scan results to GitHub Security tab
        # Fix condition to work for both push and PR (excluding forks)
        if: |
          always() &&
          (github.event_name == 'push' || 
           (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false))
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  security-scan-osv-pr:
    name: 🔐 Security Scan OSV (PR)
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}

    permissions:
      contents: read
      actions: read
      security-events: write

    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    with:
      fail-on-vuln: true
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./

  security-scan-osv-push:
    name: 🔐 Security Scan OSV (push)
    if: ${{ github.event_name == 'push' }}

    permissions:
      contents: read
      actions: read
      security-events: write

    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      fail-on-vuln: true
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./

  security-scan-zizmor:
    name: 🔐 GitHub Actions Security (zizmor)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@v0.5.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: 🧩 Dependency Review (PR)
    runs-on: ubuntu-latest

    # Skip Dependency Review for push
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@main
        with:
          fail-on-severity: high

  secrets-scan-trufflehog:
    name: 🔑 Secrets Scan TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false
          fetch-depth: 0  # Required for diff scan

      - name: TruffleHog Secrets Scan (full)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

      - name: TruffleHog Secrets Scan (diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

  build-pr:
    name: 🏗️ Build Plugin (PR)
    if: github.event_name == 'pull_request'
    needs: [
      lint-actions,
      lint-links,
      lint-markdown,
      security-scan,
      security-scan-semgrep,
      security-scan-trivy,
      security-scan-osv-pr,
      security-scan-zizmor,
      secrets-scan-trufflehog,
      dependency-review
    ]
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NoMoreTNTChainCrash
          path: ${{ github.workspace }}/build/libs/

  build-push:
    name: 🏗️ Build Plugin (push)
    if: github.event_name == 'push'
    needs: [
      lint-actions,
      lint-links,
      lint-markdown,
      security-scan,
      security-scan-semgrep,
      security-scan-snyk,
      security-scan-trivy,
      security-scan-osv-push,
      security-scan-zizmor,
      secrets-scan-trufflehog
    ]
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NoMoreTNTChainCrash
          path: ${{ github.workspace }}/build/libs/
