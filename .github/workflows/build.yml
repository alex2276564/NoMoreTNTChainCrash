name: Build Minecraft Plugin

# =============================================================================
# Security model for GitHub Actions versions:
#
# Jobs WITHOUT secrets/upload/publish (build outputs, SARIF, etc.) →
# @main is acceptable (no sensitive exposure)
# Jobs WITH secrets/upload/publish → pinned to semver tag (enables
# Renovate's minimumReleaseAge=14d delay as supply chain attack defense)
#
# SHA pinning is intentionally NOT used: Renovate's minimumReleaseAge does
# not apply to digest/pinDigest update types, so SHA pinning would give
# false sense of security without the stabilization delay. See Renovate docs:
# https://docs.renovatebot.com/key-concepts/minimum-release-age/#which-update-types-take-minimumreleaseage-into-account
# =============================================================================

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  lint-actions:
    name: 🧹 Lint Actions
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@main

      - uses: devops-actions/actionlint@main

  lint-links:
    name: 🧹 Lint Links
    runs-on: ubuntu-latest

    permissions:
      checks: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Lint Links (push)
        if: github.event_name != 'pull_request'
        uses: umbrelladocs/action-linkspector@v1.5.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          fail_level: error

      - name: Lint Links (PR)
        if: github.event_name == 'pull_request'
        uses: umbrelladocs/action-linkspector@v1.5.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error

  lint-markdown:
    name: 🧹 Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@main
        with:
          globs: '**/*.md'
          config: '.markdownlint.jsonc'

  security-scan:
    name: 🔐 Security Scan CodeQL
    runs-on: ubuntu-latest

    permissions:
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build for CodeQL
        run: ./gradlew build -x test

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-scan-snyk:
    name: 🔐 Security Scan Snyk (push)
    runs-on: ubuntu-latest

    # Skip security scan Snyk for PR (for PR we connect GitHub App integration Snyk)
    if: github.event_name == 'push'

    permissions:
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/gradle-9-jdk17@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: /opt/java/openjdk # Enforce directory expected by the Snyk container
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload Snyk scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'snyk.sarif'

  security-scan-trivy:
    name: 🔐 Security Scan Trivy
    runs-on: ubuntu-latest

    permissions:
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'

      - name: Run Trivy (console report)
        if: failure()
        run: |
          echo "==== Trivy console report ===="
          trivy fs .

      - name: Upload Trivy scan results to GitHub Security tab
        # Fix condition to work for both push and PR (excluding forks)
        if: |
          github.event_name == 'push' || 
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  security-scan-osv-pr:
    name: 🔐 Security Scan OSV (PR)
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}

    permissions:
      contents: read
      actions: read
      security-events: write

    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    with:
      fail-on-vuln: true
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./

  security-scan-osv-push:
    name: 🔐 Security Scan OSV (push)
    if: ${{ github.event_name == 'push' }}

    permissions:
      contents: read
      actions: read
      security-events: write

    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      fail-on-vuln: true
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./

  security-scan-zizmor:
    name: 🔐 GitHub Actions Security (zizmor)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@v0.5.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          advanced-security: false

  dependency-review:
    name: 🧩 Dependency Review (PR)
    runs-on: ubuntu-latest

    # Skip Dependency Review for push
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@main

      - name: Dependency Review
        uses: actions/dependency-review-action@main
        with:
          fail-on-severity: high

  secrets-scan-trufflehog:
    name: 🔑 Secrets Scan TruffleHog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0  # Required for diff scan

      - name: TruffleHog Secrets Scan (full)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

      - name: TruffleHog Secrets Scan (diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

  build-pr:
    name: 🏗️ Build Plugin (PR)
    if: github.event_name == 'pull_request'
    needs: [
      lint-actions,
      lint-links,
      lint-markdown,
      security-scan,
      security-scan-trivy,
      security-scan-osv-pr,
      security-scan-zizmor,
      secrets-scan-trufflehog,
      dependency-review
    ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NoMoreTNTChainCrash
          path: ${{ github.workspace }}/build/libs/

  build-push:
    name: 🏗️ Build Plugin (push)
    if: github.event_name == 'push'
    needs: [
      lint-actions,
      lint-links,
      lint-markdown,
      security-scan,
      security-scan-snyk,
      security-scan-trivy,
      security-scan-osv-push,
      security-scan-zizmor,
      secrets-scan-trufflehog
    ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NoMoreTNTChainCrash
          path: ${{ github.workspace }}/build/libs/
